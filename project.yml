name: FinanceApp
options:
  bundleIdPrefix: com.financeapp
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

targetTemplates:
  AppBase:
    sources:
      - path: Sources
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financeapp.FinanceApp
        INFOPLIST_GENERATION_MODE: GeneratedFile
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: FinanceApp.entitlements
        SWIFT_EMIT_LOC_STRINGS: true
        ENABLE_PREVIEWS: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

targets:
  FinanceApp-iOS:
    type: application
    platform: iOS
    templates:
      - AppBase
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1,2"

  FinanceApp-macOS:
    type: application
    platform: macOS
    templates:
      - AppBase

  FinanceAppTests-iOS:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: FinanceApp-iOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financeapp.FinanceAppTests
        GENERATE_INFOPLIST_FILE: true

  FinanceAppTests-macOS:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: FinanceApp-macOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.financeapp.FinanceAppTests
        GENERATE_INFOPLIST_FILE: true

schemes:
  FinanceApp-iOS:
    build:
      targets:
        FinanceApp-iOS: all
        FinanceAppTests-iOS: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FinanceAppTests-iOS

  FinanceApp-macOS:
    build:
      targets:
        FinanceApp-macOS: all
        FinanceAppTests-macOS: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - FinanceAppTests-macOS
